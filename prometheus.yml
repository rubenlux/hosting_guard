global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/prometheus_alerts.yml

scrape_configs:
  - job_name: 'hosting_guard'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:8000']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

