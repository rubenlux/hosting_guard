# HostingGuard — Error Signatures Map
# Maps exact log/error patterns to incident runbook IDs.
# Used by the RAG diagnostic engine for exact-match lookup (confidence 1.0)
# and by the monitoring layer for alerting.
#
# Fields:
#   id          — unique signature ID (sig_NNN, sequential)
#   pattern     — exact substring or regex to match in logs/errors
#   incident_id — runbook ID in docs/incidents/runbooks/
#   source      — where this signature appears (traefik_logs, app_logs, db_logs, browser_console, etc.)
#   confidence  — 1.0 = exact match, 0.9 = very likely, 0.8 = probable
#   type        — exact | regex | substring

