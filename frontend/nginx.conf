server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server header and error pages
    server_tokens off;

    # When behind a proxy (Traefik), nginx generates absolute redirects using
    # the internal HTTP scheme. absolute_redirect off makes trailing-slash
    # redirects (e.g. /assets → /assets/) relative so the browser keeps HTTPS.
    absolute_redirect off;

    # HTTPS redirect — belt-and-suspenders when Traefik forwards HTTP traffic
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' https://api.hostingguard.lat; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.hostingguard.lat; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Block hidden files and directories (except .well-known for ACME) ──────
    location ~ /\.(?!well-known).* {
        return 404;
    }

    # ── Block sensitive config and build-tool filenames at root ───────────────
    location ~* ^/(docker-compose(\.prod)?\.ya?ml|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|vite\.config\.(js|ts)|next\.config\.(js|ts)|backup\.zip|\.gitignore|\.eslintrc(\.(js|json|ya?ml))?|\.prettierrc(\.(js|json|ya?ml))?|Dockerfile.*)$ {
        return 404;
    }

    # ── Block sensitive file extensions — never serve these ──────────────────
    location ~* \.(sql|env|bak|backup|old|gz|tgz|tar|zip|7z|rar|log|conf|ini|sh|py|rb|php|pem|key|crt|pfx|p12|DS_Store|yml|yaml|toml|lock)$ {
        return 404;
    }

    # ── Vite build assets: exact files only, no SPA fallback ─────────────────
    # ^~ prevents regex location blocks above from shadowing /assets/ files.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-declare security headers (nginx add_header inheritance drops parent
        # headers when a child location defines its own add_header directives).
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    }

    # ── Screenshots: static files, no SPA fallback ────────────────────────────
    location ^~ /screenshots/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    }

    # ── robots.txt: serve real file, no SPA fallback ──────────────────────────
    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── sitemap.xml: serve real file with correct MIME, no SPA fallback ───────
    location = /sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
