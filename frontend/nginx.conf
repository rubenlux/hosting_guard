server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server header and error pages
    server_tokens off;

    # HTTPS redirect — belt-and-suspenders when Traefik forwards HTTP traffic
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://api.hostingguard.lat; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.hostingguard.lat; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Vite build assets: never fall back to SPA on 404 ──────────────────────
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-declare security headers — nginx add_header inheritance requires this
        # when a nested location block uses its own add_header directives.
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    }

    # ── Block sensitive file extensions — never serve these ──────────────────
    location ~* \.(sql|env|bak|gz|tar|log|conf|ini|sh|py|rb|php|pem|key|crt|pfx|p12|DS_Store)$ {
        return 404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
