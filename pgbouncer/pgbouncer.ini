[databases]
; Route all connections for the app database to the real PostgreSQL server.
; DB name, host, and port are configured here; credentials come from userlist.txt.
;
; Replace "hosting_guard" with your actual POSTGRES_DB value.
; "postgres" is the internal Docker service hostname.
hosting_guard = host=postgres port=5432 dbname=hosting_guard

[pgbouncer]
; ── Networking ──────────────────────────────────────────────────────────────
listen_addr   = 0.0.0.0
listen_port   = 5432

; ── Pool configuration ──────────────────────────────────────────────────────
; transaction mode: safe for psycopg2 + FastAPI (no session-level state).
; session mode required if you use SET LOCAL, advisory locks, or LISTEN/NOTIFY.
pool_mode          = transaction

; Connections from the app (client side)
max_client_conn    = 200

; Real connections to PostgreSQL (server side) per database+user pair.
; 20 PG connections handle ~200 concurrent app connections in transaction mode.
default_pool_size  = 20

; Keep a few spare connections pre-warmed to handle burst traffic.
min_pool_size      = 5

; Reserve connections for admin queries (pgbouncer SHOW STATS etc.)
reserve_pool_size  = 3
reserve_pool_timeout = 3

; ── Authentication ───────────────────────────────────────────────────────────
; md5 auth with a flat userlist.txt — sufficient for internal Docker network.
; Use scram-sha-256 if you expose PgBouncer outside the internal network.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_idle_timeout    = 600    ; close idle PG connections after 10 min
client_idle_timeout    = 0      ; never close idle client connections
query_timeout          = 0      ; no per-query timeout (app handles its own)
server_connect_timeout = 10
server_login_retry     = 15

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1

; ── Admin ────────────────────────────────────────────────────────────────────
; Access SHOW STATS / PAUSE / RESUME from the pgbouncer pseudo-database.
; Restrict to the internal network — never expose to the public.
admin_users = postgres
stats_users = postgres
