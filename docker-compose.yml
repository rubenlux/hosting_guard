services:

  # ---------------------------------------------------------------------------
  # docker-socket-proxy — único punto de acceso al socket de Docker.
  # Ni Traefik ni la app montan el socket directamente.
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker_socket_proxy
    restart: always
    environment:
      CONTAINERS:   1
      NETWORKS:     1
      SERVICES:     1
      TASKS:        1
      POST:         1   # crear/parar/reiniciar contenedores de usuarios
      IMAGES:       1
      INFO:         1
      PING:         1
      EXEC:         0
      BUILD:        0
      COMMIT:       0
      CONFIGS:      0
      DISTRIBUTION: 0
      PLUGINS:      0
      SECRETS:      0
      SESSION:      0
      SWARM:        0
      SYSTEM:       0
      VOLUMES:      0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - socket_proxy_network

  # ---------------------------------------------------------------------------
  # traefik — reverse proxy + TLS automático
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    depends_on:
      - docker-socket-proxy

    command:
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=inspyria.cloud@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "./letsencrypt:/letsencrypt"
      # sin socket directo — usa el proxy

    networks:
      - hosting_network
      - socket_proxy_network

  # ---------------------------------------------------------------------------
  # app — backend FastAPI
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
    container_name: hosting_guard
    restart: always
    env_file: .env.production
    depends_on:
      - docker-socket-proxy
      - pgbouncer
      - redis

    environment:
      # La CLI de docker usa el proxy en lugar del socket directo
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hg.rule=Host(`api.hostingguard.lat`)"
      - "traefik.http.routers.hg.entrypoints=websecure"
      - "traefik.http.routers.hg.tls.certresolver=le"
      - "traefik.http.services.hg.loadbalancer.server.port=8000"

    volumes:
      - ./data:/app/data
      - /usr/bin/docker:/usr/bin/docker:ro   # binario docker del host (solo lectura)
      - /opt/clients:/opt/clients             # sitios desplegados por usuarios (github deploy)
      # sin socket directo — DOCKER_HOST apunta al proxy

    networks:
      - hosting_network
      - socket_proxy_network

  # ---------------------------------------------------------------------------
  # frontend — React (Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    networks:
      - hosting_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`hostingguard.lat`) || Host(`www.hostingguard.lat`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # pgbouncer — connection pooler between the app and PostgreSQL.
  #
  # Why: psycopg2's ThreadedConnectionPool holds persistent connections.
  # With maxconn=60 and multiple workers, PostgreSQL can reach its
  # connection limit (default 100). PgBouncer multiplexes app connections
  # onto a smaller set of real PG connections (pool_size=20 is enough for
  # most workloads) and handles connection storm during restart.
  #
  # Mode: transaction — safe for FastAPI (no SET LOCAL, no advisory locks,
  # no LISTEN/NOTIFY). Use session mode only if you add those features.
  #
  # The app's DATABASE_URL should point here:
  #   postgresql://user:pass@pgbouncer:5432/dbname
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: pgbouncer
    restart: always
    env_file: .env.production   # reads PGBOUNCER_* vars (see pgbouncer/pgbouncer.ini)
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - hosting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # postgres — base de datos relacional
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: hosting_guard_db
    restart: always
    env_file: .env.production   # lee POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hosting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # redis — revocación de tokens persistente y caché de AI
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: always
    env_file: .env.production
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru"
    volumes:
      - redisdata:/data
    networks:
      - hosting_network
    # sin puertos expuestos — solo accesible internamente
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # node-exporter — host-level CPU / RAM / Disk metrics for Prometheus
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - hosting_network

  # ---------------------------------------------------------------------------
  # prometheus — métricas internas
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"   # solo loopback — no expuesto a Internet
    networks:
      - hosting_network

  # ---------------------------------------------------------------------------
  # orchestrator — Monitoreo y auto-scaling inteligente (Safe Mode: DRY_RUN)
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
    container_name: orchestrator
    restart: always
    env_file: .env.production
    depends_on:
      - docker-socket-proxy
      - app
    command: python -m app.services.orchestrator
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    volumes:
      - /usr/bin/docker:/usr/bin/docker:ro
      - ./data:/app/data
    networks:
      - hosting_network
      - socket_proxy_network

networks:
  hosting_network:
    driver: bridge
  socket_proxy_network:
    driver: bridge
    internal: true   # sin acceso a Internet

volumes:
  pgdata:
  redisdata:
